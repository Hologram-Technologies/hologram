name: hologram
description: O(1) compute acceleration runtime built on UOR-Framework
role: library
depends_on:
- UOR-Framework
crates:
- name: hologram-archive
  public: true
  prism_space: kernel
- name: hologram-async
  public: true
  prism_space: bridge
- name: hologram-bench
  public: true
  prism_space: user
- name: hologram-cli
  public: true
  prism_space: user
- name: hologram-compiler
  public: true
  prism_space: bridge
- name: hologram-core
  public: true
  prism_space: kernel
- name: hologram-exec
  public: true
  prism_space: bridge
- name: hologram-ffi
  public: true
  prism_space: user
- name: hologram-graph
  public: true
  prism_space: kernel
registry: ../hologram-architecture/archon-registry
rules:
- id: tests-pass
  run: cargo test --all
  description: All tests pass across the workspace
- id: no-clippy-warnings
  run: cargo clippy --all -- -D warnings
  description: No clippy warnings or errors
- id: builds-clean
  run: cargo build --all
  description: All crates build successfully

# cargo-deny configuration — supply-chain gate for the Hologram workspace.
# Run: `cargo deny check` (or `just deny`). See specs/refactor/07-governance-requirements.md.

[graph]
all-features = true

[advisories]
version = 2
# RUSTSEC advisories: fail the build on any known vulnerability or unmaintained
# crate. Add IDs to `ignore` (with a justification comment) only when triaged.
yanked = "deny"
# Triaged 2026-07-15. Every entry is an `unmaintained` advisory on a mature, transitive
# crate with NO upstream fix (an unmaintained crate gets no new release). Vulnerabilities
# and unsound advisories are NOT ignored — the crossbeam / memmap2 ones were cleared by a
# lockfile bump, and `yanked` stays "deny". Revisit when the Python frontend (rustpython)
# and idna are updated; these enter only through those paths.
ignore = [
    "RUSTSEC-2024-0436", # paste — unmaintained (proc-macro, via rustpython)
    "RUSTSEC-2025-0075", # unic-char-property — unmaintained (via idna/rustpython)
    "RUSTSEC-2025-0080", # unic-common — unmaintained
    "RUSTSEC-2025-0081", # unic-ucd-version — unmaintained
    "RUSTSEC-2025-0090", # unic-char-range — unmaintained
    "RUSTSEC-2025-0098", # unic-ucd-ident — unmaintained
    "RUSTSEC-2025-0100", # unic-emoji-char — unmaintained
]

[licenses]
version = 2
# The workspace ships `MIT OR Apache-2.0`; transitive deps must land in this
# permissive set. Additions require a deliberate review (they end up in what we
# redistribute). Keep alphabetized.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
# The optional `frontend-python` feature pulls `rustpython-parser`, whose bignum
# backend (the `malachite*` family) is LGPL-3.0-only. The DEFAULT build is LGPL-free;
# enabling `frontend-python` inherits LGPL obligations (static-link relink rights).
# Scoped exceptions (not a blanket LGPL allow) so this stays explicit and reviewable.
# GOVERNANCE FLAG (07): revisit dropping/replacing the Python frontend before P3.
exceptions = [
    { name = "malachite", allow = ["LGPL-3.0-only"] },
    { name = "malachite-base", allow = ["LGPL-3.0-only"] },
    { name = "malachite-bigint", allow = ["LGPL-3.0-only"] },
    { name = "malachite-nz", allow = ["LGPL-3.0-only"] },
    { name = "malachite-q", allow = ["LGPL-3.0-only"] },
]

[bans]
# Duplicate versions bloat the tree but aren't fatal during an active refactor;
# surface them as warnings. Tighten to "deny" before the P3 release.
multiple-versions = "warn"
wildcards = "warn"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"

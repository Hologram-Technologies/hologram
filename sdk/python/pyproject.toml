[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hologram"
version = "0.11.0"
description = "Python SDK for building and compiling Hologram tensor graphs"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT OR Apache-2.0" }
authors = [{ name = "UOR Foundation" }]
keywords = ["hologram", "tensor", "compiler", "uor"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/Hologram-Technologies/hologram"
Repository = "https://github.com/Hologram-Technologies/hologram"

[tool.setuptools.packages.find]
where = ["."]
include = ["hologram*"]

[tool.setuptools.package-data]
hologram = ["py.typed", "_hologram_ffi.*"]

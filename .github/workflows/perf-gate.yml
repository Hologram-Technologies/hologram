name: Performance Gate

# Blocks a PR from merging if it regresses benchmarked performance relative to
# the target branch. Both sides are benchmarked back-to-back on the *same*
# runner so machine variance is controlled; `scripts/compare-benchmarks.py`
# then fails the job on any median regression that clears both the relative
# threshold and the measured-noise band.
#
# Make this a required status check (Settings → Branches → main) to enforce it.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Tunable gate (env so it can be adjusted without touching the script):
  REGRESSION_THRESHOLD: "0.10" # 10% median slowdown
  NOISE_SIGMAS: "2.0" # ...and outside 2σ of combined jitter

# A newer push to the same PR cancels an in-flight gate run.
concurrency:
  group: perf-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  perf-gate:
    name: Benchmark regression gate
    runs-on: ubuntu-latest
    # Two full `cargo bench --workspace` runs (PR + baseline) plus a compile of
    # each tree. The single-run Benchmarks job budgets 45 min, so allow headroom.
    timeout-minutes: 120

    steps:
      - name: Checkout PR (merge result)
        uses: actions/checkout@v6
        # Default ref for pull_request is the PR-merged-into-base commit — i.e.
        # exactly what would land. That is the "PR" side of the comparison.

      - name: Checkout target baseline
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Share the dependency cache across both trees.
          workspaces: |
            .
            baseline

      - name: Benchmark PR (merge result)
        run: |
          set +e
          cargo bench --workspace 2>&1 | tee pr-bench-output.txt
          set -e
          test -d target/criterion || { echo "::error::no PR benchmark results"; exit 1; }
          python3 scripts/aggregate-benchmarks.py target/criterion pr-bench.json "${{ github.sha }}"

      - name: Benchmark target baseline
        working-directory: baseline
        run: |
          set +e
          cargo bench --workspace 2>&1 | tee ../base-bench-output.txt
          set -e
          test -d target/criterion || { echo "::error::no baseline benchmark results"; exit 1; }
          # Use the PR's aggregator (the baseline checkout predates it).
          python3 "$GITHUB_WORKSPACE/scripts/aggregate-benchmarks.py" \
            target/criterion "$GITHUB_WORKSPACE/base-bench.json" \
            "${{ github.event.pull_request.base.sha }}"

      - name: Compare and gate
        run: |
          python3 scripts/compare-benchmarks.py \
            base-bench.json pr-bench.json \
            --threshold "${REGRESSION_THRESHOLD}" \
            --noise-sigmas "${NOISE_SIGMAS}" \
            --output "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-gate-results
          path: |
            base-bench.json
            pr-bench.json
            pr-bench-output.txt
            base-bench-output.txt
          retention-days: 14

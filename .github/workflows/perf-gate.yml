name: Performance Gate

# Blocks a PR from merging if it regresses benchmarked performance relative to
# the target branch. Both sides are benchmarked back-to-back on the *same*
# runner so machine variance is controlled; `scripts/compare-benchmarks.py`
# then fails the job on any median regression that clears both the relative
# threshold and the measured-noise band.
#
# Make this a required status check (Settings → Branches → main) to enforce it.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Tunable gate (env so it can be adjusted without touching the script):
  REGRESSION_THRESHOLD: "0.10" # 10% median slowdown …
  NOISE_SIGMAS: "2.0" #          … outside 2σ of …
  CV_FLOOR: "0.07" #             … noise floored at 7% of baseline (shared-runner variance)
  BENCH_RUNS: "3" #             best-of-N: min across N runs kills transient contention spikes

# A newer push to the same PR cancels an in-flight gate run.
concurrency:
  group: perf-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  perf-gate:
    name: Benchmark regression gate
    runs-on: ubuntu-latest
    # Best-of-N benchmark runs for both the PR and the baseline tree, plus a
    # compile of each. The single-run Benchmarks job budgets 45 min; allow
    # headroom for the repeats.
    timeout-minutes: 120

    steps:
      - name: Checkout PR (merge result)
        uses: actions/checkout@v6
        # Default ref for pull_request is the PR-merged-into-base commit — i.e.
        # exactly what would land. That is the "PR" side of the comparison.

      - name: Checkout target baseline
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Share the dependency cache across both trees.
          workspaces: |
            .
            baseline

      - name: Benchmark PR + baseline (interleaved best-of-N)
        run: |
          # Interleave the two trees round-by-round on this one runner so the
          # runner's throughput drift hits both sides equally (a two-phase
          # comparison mistakes that drift for a regression — see the script).
          scripts/interleave-bench-gate.sh \
            "$GITHUB_WORKSPACE" baseline "$GITHUB_WORKSPACE/scripts" "$BENCH_RUNS" \
            "$GITHUB_WORKSPACE/pr-bench.json" "$GITHUB_WORKSPACE/base-bench.json"

      - name: Compare and gate
        run: |
          # The baseline manifest (if present) lets the lifecycle gate tell a
          # proper deprecation from an undeclared removal.
          BASE_MANIFEST_ARG=""
          if [ -f baseline/benches/manifest.toml ]; then
            BASE_MANIFEST_ARG="--baseline-manifest baseline/benches/manifest.toml"
          fi
          python3 scripts/compare-benchmarks.py \
            base-bench.json pr-bench.json \
            --threshold "${REGRESSION_THRESHOLD}" \
            --noise-sigmas "${NOISE_SIGMAS}" \
            --cv-floor "${CV_FLOOR}" \
            --manifest benches/manifest.toml $BASE_MANIFEST_ARG \
            --output "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-gate-results
          path: |
            base-bench.json
            pr-bench.json
          retention-days: 14

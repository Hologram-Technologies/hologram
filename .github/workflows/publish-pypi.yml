name: Publish · PyPI

# Publishes the Python SDK (dist name `uor-hologram`, import `hologram`) to PyPI via OIDC TRUSTED
# PUBLISHING — there is NO PYPI_API_TOKEN. Configure a trusted publisher on pypi.org (or a "pending
# publisher" before the first release exists — PyPI, unlike npm, allows pre-configuration):
#   PyPI project: uor-hologram
#   Owner:        Hologram-Technologies
#   Repository:   hologram
#   Workflow:     publish-pypi.yml
#   Environment:  (leave blank — the publish job sets none)
# There's no token `gate` job like this file used to have: OIDC can't be probed from a secret, so an
# unconfigured publisher just fails the publish step loudly. If the trusted publisher requires a
# GitHub Environment, add `environment: <name>` to the `publish` job to match.
run-name: "Publish PyPI · ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build (pure-python — one universal wheel + sdist)
        run: |
          python -m pip install --upgrade build
          python -m build sdk/python --outdir dist
          ls -l dist
      - uses: actions/upload-artifact@v7
        with:
          name: pypi-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (mints the short-lived PyPI token)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pypi-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — with `id-token: write` the action performs the OIDC exchange against the
        # configured trusted publisher. For a TestPyPI dry run, add
        # `with: repository-url: https://test.pypi.org/legacy/` and a matching pending publisher there.

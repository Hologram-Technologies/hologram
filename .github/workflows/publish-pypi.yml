name: Publish · PyPI

# Publishes the Python SDK (dist name `uor-hologram`, import `hologram`) to PyPI on a release tag.
# Auto-enabled by the presence of the PYPI_API_TOKEN secret — no manual flag.
#
# NOTE: this uses a PyPI API TOKEN (not OIDC trusted publishing). Trusted publishing has no secret to
# key on, so it can't be "enable when the token is set" — it would need a flag. Token auth is what
# makes the token-presence gate work. If you'd rather keep OIDC (more secure, no long-lived token),
# say so and I'll switch back to trusted publishing + gate it on a flag instead.
run-name: "Publish PyPI · ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Enable only when PYPI_API_TOKEN is set (no PUBLISH_* flag). Secrets can't be used in a job-level
  # `if:`, so read it here and expose a boolean the build/publish jobs key on.
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "PYPI_API_TOKEN not set — skipping PyPI publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build wheel + sdist
    needs: gate
    if: ${{ needs.gate.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build (pure-python — one universal wheel + sdist)
        run: |
          python -m pip install --upgrade build
          python -m build sdk/python --outdir dist
          ls -l dist
      - uses: actions/upload-artifact@v7
        with:
          name: pypi-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [gate, build]
    if: ${{ needs.gate.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pypi-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # For a dry run against TestPyPI: add `repository-url: https://test.pypi.org/legacy/`
          # and a TEST_PYPI_API_TOKEN.

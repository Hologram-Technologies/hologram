name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # RUSTFLAGS removed - using .cargo/config.toml instead

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          set +e
          echo "=== Running workspace benchmarks ==="
          cargo bench --workspace 2>&1 | tee benchmark-output.txt
          set -e

          if [ ! -d "target/criterion" ]; then
            echo "ERROR: No benchmark results found"
            exit 1
          fi

      - name: Aggregate benchmark results to JSON
        run: |
          python3 scripts/aggregate-benchmarks.py target/criterion bench.json ${{ github.sha }}
          echo "=== Benchmark Results Summary ==="
          cat bench.json | python3 -m json.tool | head -100

      - name: Generate deploy token
        id: app-token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: UOR-Foundation
          repositories: hologram-website

      - name: Push benchmarks to website repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.app-token.outputs.token != ''
        env:
          WEBSITE_DEPLOY_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          git clone --depth 1 "https://x-access-token:${WEBSITE_DEPLOY_TOKEN}@github.com/UOR-Foundation/hologram-website.git" /tmp/website

          # Create date-based directory structure within public/
          BENCH_DIR="/tmp/website/public/benches/${DATE}"
          mkdir -p "$BENCH_DIR"

          # Copy benchmark results with timestamp for uniqueness (multiple runs per day)
          cp bench.json "${BENCH_DIR}/${TIMESTAMP}.json"

          # Also keep a latest.json in the date directory
          cp bench.json "${BENCH_DIR}/latest.json"

          # Create/update symlink to current benchmark
          cd /tmp/website/public/benches
          rm -f current.json
          ln -s "${DATE}/latest.json" current.json

          cd /tmp/website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/benches/
          git commit -m "Update benchmark results from hologram@${{ github.sha }}" || exit 0
          git push origin main

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench.json
            benchmark-output.txt
            target/criterion/
          retention-days: 30

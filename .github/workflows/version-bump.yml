name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version, e.g. 0.12.0 (overrides version_type when set)'
        required: false
        type: string
        default: ''
      version_type:
        description: 'Bump type (used only when `version` is empty)'
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Pre-release identifier (leave empty for stable release)'
        required: false
        type: choice
        options:
          - ''
          - alpha
          - beta
          - rc

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current_version
        run: |
          # The shared workspace version (no package is named `hologram`).
          CURRENT=$(scripts/workspace-version.sh)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Bump version
        id: bump
        env:
          EXPLICIT_VERSION: ${{ inputs.version }}
          VERSION_TYPE: ${{ inputs.version_type }}
        run: |
          # Set an explicit version if provided (`just release 0.12.0`); otherwise bump by type
          # (`just release-auto minor`). Env-indirected so the untrusted input never lands in the
          # shell verbatim.
          if [ -n "$EXPLICIT_VERSION" ]; then
            cargo set-version --workspace "$EXPLICIT_VERSION"
          else
            cargo set-version --workspace --bump "$VERSION_TYPE"
          fi

          # Get the new version
          NEW_VERSION=$(scripts/workspace-version.sh)

          # Add prerelease identifier if specified
          if [ -n "${{ inputs.prerelease }}" ]; then
            cargo set-version --workspace "${NEW_VERSION}-${{ inputs.prerelease }}.1"
            NEW_VERSION=$(scripts/workspace-version.sh)
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Sync SDK versions to the new workspace version
        run: |
          # The SDK packages are workspace-excluded (wasm cdylib / N-API), so `cargo set-version
          # --workspace` above does not touch them — sync them explicitly (gated by the
          # `sdk-version-consistency` CI job) and refresh their lockfiles so they don't drift.
          scripts/sync-sdk-versions.sh
          cargo generate-lockfile --manifest-path sdk/typescript/native/native/Cargo.toml
          cargo generate-lockfile --manifest-path sdk/typescript/wasm/driver/Cargo.toml

      - name: Install nightly (for rustdoc JSON)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-public-api
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api

      - name: Snapshot public API + update API changelog
        run: |
          # Regenerate the committed per-crate API snapshots at the new version,
          # then diff against the previous release's archive to update
          # api/CHANGELOG.md and archive this release's snapshots. The history
          # logic lives in a tested script (scripts/test-release-tooling.sh).
          scripts/update-api-snapshots.sh
          scripts/release-api-history.sh \
            "${{ steps.bump.outputs.new_version }}" \
            "${{ steps.current_version.outputs.version }}"

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION=${{ steps.bump.outputs.new_version }}

          # Create CHANGELOG.md if it doesn't exist
          if [ ! -f CHANGELOG.md ]; then
            cat > CHANGELOG.md << 'EOL'
          # Changelog

          All notable changes to this project will be documented in this file.

          The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
          and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

          ## [Unreleased]

          EOL
          fi

          # Insert new version section after [Unreleased]
          sed -i "/## \[Unreleased\]/a\\
          \\n## [${VERSION}] - ${DATE}\\n\\n### Added\\n- \\n\\n### Changed\\n- \\n\\n### Fixed\\n- " CHANGELOG.md

      - name: Commit version bump
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}

          # Add all Cargo.toml files, the changelogs, and the API snapshots +
          # history archived by the API-snapshot step.
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml CHANGELOG.md api/ \
                  sdk/typescript/package.json sdk/typescript/native/package.json \
                  sdk/typescript/wasm/package.json sdk/typescript/native/native/Cargo.toml \
                  sdk/typescript/wasm/driver/Cargo.toml sdk/python/pyproject.toml \
                  sdk/typescript/native/native/Cargo.lock sdk/typescript/wasm/driver/Cargo.lock

          # Commit changes
          git commit -m "chore: bump version to v${VERSION}"

          echo "Version bump committed"

      - name: Create and push tag
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}

          # Create annotated tag
          git tag -a "v${VERSION}" -m "Release version ${VERSION}"

          echo "Tag v${VERSION} created"

      - name: Push changes and tag
        run: |
          # Push the commit
          git push origin main

          # Push the tag (this will trigger the publish workflow)
          git push origin --tags

          echo "Changes and tag pushed to remote"

      - name: Summary
        run: |
          echo "## ✅ Version Bump Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Version:** ${{ steps.current_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** ${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ inputs.version_type }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.prerelease }}" ]; then
            echo "**Pre-release:** ${{ inputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. The publish workflow has been automatically triggered by the version tag" >> $GITHUB_STEP_SUMMARY
          echo "2. Monitor the [Actions tab](https://github.com/${{ github.repository }}/actions) for publish progress" >> $GITHUB_STEP_SUMMARY
          echo "3. Once published, the release will be available at [Releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY
          echo "4. Update the CHANGELOG.md with actual changes for this version" >> $GITHUB_STEP_SUMMARY

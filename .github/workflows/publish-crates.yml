name: Publish · crates.io

# Publishes every publishable workspace crate to crates.io on a release tag, in dependency order.
# Auto-enabled by the presence of the CARGO_REGISTRY_TOKEN secret — no manual flag. crates.io
# versions are PERMANENT, so the publish also runs behind the `crates-io` GitHub Environment (create
# it with a required reviewer for an approval gate).
run-name: "Publish crates.io · ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the computed publish order only (no publish)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # Secrets can't be used in a job-level `if:`, so this reads CARGO_REGISTRY_TOKEN and exposes a
  # boolean the publish job keys on — "enable when the token is set", no PUBLISH_* flag to remember.
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: cargo publish (topological order)
    needs: gate
    # Publish when the token is present; also run for a dry-run dispatch (which needs no token).
    if: ${{ needs.gate.outputs.enabled == 'true' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    environment: crates-io       # approval gate — permanent publishes
    timeout-minutes: 120         # ~19 crates, each verified by cargo publish
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: cargo publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: bash scripts/publish-crates.sh

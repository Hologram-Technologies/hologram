name: CI

# Per-run title that identifies the COMMIT under test, so runs aren't all stamped with the
# (identical, static) PR title. Push/tag runs show the commit subject; PR runs can't read the
# commit message from the event payload, so they fall back to the head SHA — either way each run
# is distinct. e.g. "CI · main · fix: cap untrusted alloc" / "CI · chore/refactor · 336bb841…".
run-name: "CI · ${{ github.head_ref || github.ref_name }} · ${{ github.event.head_commit.message || github.event.pull_request.head.sha || github.sha }}"

on:
  push:
    branches: [main]
    # A release cut is a version tag: ci.yml runs its lean gate here and `release.yml` runs the heavy
    # tier (QEMU/Playwright/JDK conformance + SDK matrix) in parallel — together the full suite.
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  pull_request:
    branches: [main]
  # Merge queue: GitHub builds each queued PR on a temporary `merge_group` ref, so the lean gate
  # must run there too — otherwise the required `CI Success` check never reports and the queue stalls.
  merge_group:
  workflow_dispatch: {}
  # Nightly rot-detection lives in `release.yml` (it owns the heavy jobs); this lean gate has nothing
  # to re-run on a schedule.

# Only the newest commit on a ref needs the lean gate: a new push cancels the superseded in-flight
# run rather than stacking runs on the runners. Keyed per PR (or per branch/tag on push) so distinct
# PRs never cancel each other. `main` and release tags are exempt so every landed commit and every
# release run keeps its own verified run.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: Check formatting
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  # Job 2: Clippy linting
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Job 3: Test
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.os }}-test

      # holospaces' CC integration tests need the vv/artifacts fixtures + Linux tools (e2fsprogs,
      # qemu, docker); on a generic runner where a tool is present but the fixture isn't, some
      # would try to read the fixture rather than skip. They are comprehensively gated by the
      # holospaces-vv-heavy job (fixtures materialized), so exclude the space from the generic
      # matrix test; its lib/unit tests run in holospaces-vv-heavy.
      - name: Run tests
        run: cargo test --workspace --exclude holospaces

      - name: Run doc tests
        run: cargo test --workspace --exclude holospaces --doc

  # Job 5: Documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: docs

      - name: Build documentation
        # Use --lib to only document libraries, avoiding filename collision
        # between the 'hologram' library crate and 'hologram' CLI binary
        run: cargo doc --workspace --no-deps --lib
        env:
          # Allow specific doc warnings that have many false positives:
          # - broken_intra_doc_links: Square brackets in math expressions
          # - invalid_html_tags: Angle brackets in type expressions
          # Add AVX2 for x86_64 (required by compile-time guard in prism::channel)
          RUSTDOCFLAGS: "-D warnings -A rustdoc::broken_intra_doc_links -A rustdoc::invalid_html_tags -C target-feature=+avx2"

  # Job 7: Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Job 8: Cross-compilation targets (WASM, aarch64)
  # Cross-compilation targets (wasm32, aarch64).
  #
  # The no_std crates form the portable core that must build for every
  # supported target. std-only crates (hologram-compute / -exec /
  # -compiler / -ffi / -cli / -bench / -archive) depend on libc / threads
  # / mmap and are intentionally NOT cross-targeted; their CI coverage
  # is the matrix-`test` job.
  cross-targets:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - wasm32-unknown-unknown
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # blake3 (transitive via uor-prism-crypto -> prism::crypto::Blake3Hasher)
      # turns on NEON assembly when the target is aarch64 and needs an
      # aarch64-linux-gnu cross-cc to compile the C wrapper. ubuntu-latest
      # ships gcc-aarch64-linux-gnu in apt — wire it through via
      # CARGO_TARGET_<TARGET>_LINKER + CC_<target> so the cc crate picks
      # it up. wasm32 builds compile blake3's portable path and need no
      # additional toolchain.
      - name: Install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          # The GitHub runner image ships third-party apt sources
          # (packages.microsoft.com / azure-cli) that intermittently fail
          # signature verification and abort `apt-get update`. They are
          # irrelevant to the cross toolchain, so drop them first so a broken
          # upstream repo cannot flake this job.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources || true
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: cross-${{ matrix.target }}

      - name: Check no_std core
        run: |
          cargo check --target ${{ matrix.target }} \
            -p hologram-types \
            -p hologram-ops \
            -p hologram-graph

  # Job 9: V&V suites the debug `cargo test --workspace` (the `test` job) does
  # not exercise — enforcing the full CONFORMANCE.md catalog on every push:
  #   * PV (performance floors): release-only (`#![cfg(not(debug_assertions))]`),
  #     so they compile to zero tests in debug.
  #   * PA (parallel-execution conformance): gated behind `--features parallel`.
  #   * AS/MA (external-authority model-format conformance): gated behind
  #     `--features model-formats`.
  # Mirrors the `parallel`, `perf`, and `conformance` targets of `just vv`.
  vv:
    name: V&V (perf + parallel + model-formats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: vv

      - name: CC bijection audit + honesty meta-gate + BDD (MG-7, artifact-free)
        run: cargo test -p hologram-conformance --test cc_gate --test meta_gate --test bdd

      - name: External-authority + scaling conformance (model-formats)
        run: |
          cargo test -p hologram-archive --test conformance --test model_address --features model-formats
          cargo test -p hologram-compute --test conformance --features cpu
          cargo test -p hologram-exec --test conformance

      - name: Parallel-execution conformance (--features parallel)
        run: cargo test -p hologram-compute --features cpu,parallel --test parallel --test conformance --lib cpu::parallel

      - name: Performance floors (release-only, PV class)
        run: |
          cargo test --release -p hologram-compute --test performance --features cpu -- --nocapture
          cargo test --release -p hologram-exec --test performance -- --nocapture

  # Job 10: Quality-gate tooling tests — the gates' own Python/shell logic
  # (regression compare, benchmark lifecycle, best-of-N, API changelog, and the
  # release API-history flow). No Rust toolchain needed, so it's fast.
  tooling-tests:
    name: Quality-gate tooling tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Tooling unit tests
        run: python3 scripts/test_quality_gates.py
      - name: Release API-history flow test
        run: bash scripts/test-release-tooling.sh

  # Job 11: Deployment-substrate V&V — the container substrate's own conformance
  # catalog (CR/ST/SP/NW/HAL/CM/DI/RB/TR/SPINE classes; see
  # specs/docs/container-substrate-vv.md), which `cargo test --workspace` does
  # not fully exercise: the live HTTP-CAS transport (--features live), the RZ
  # gate (the tensor compute engine must be absent from store/route crates), the
  # no_std tri-target builds, and the runnable real-world examples. Mirrors the
  # `vv-substrate` + `examples` recipes of the Justfile.
  substrate:
    name: Substrate V&V (storage · runtime · network)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, thumbv7em-none-eabi

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: substrate

      # Crate names updated for the post-refactor consolidation: substrate-core / realizations /
      # bare-hal → hologram-space; store-mem / substrate-tck → hologram-tck; net-{http,tcp,bare} →
      # hologram-net; runtime-{bare,wasmtime} → hologram-runtime (engine-wasmi / engine-wasmtime
      # features); substrate-cli → hologram-cli. (Mappings + no_std feature flags verified locally.)
      - name: Conformance + worked-example battery
        run: |
          cargo test \
            -p hologram-space -p hologram-tck \
            -p hologram-net -p hologram-runtime -p hologram-cli
          # hologram-store's backend tests are feature-gated (bare no_std / native std).
          cargo test -p hologram-store --features bare,native

      - name: Live transports (NW class — HTTP-CAS + κ-XOR DHT + QUIC)
        # `tcp` so the tokio-backed uor-native DHT test compiles alongside the live HTTP-CAS
        # transport; `quic` runs the encrypted-P2P-over-QUIC localhost handshake/fetch suite
        # (spec 04 — the substrate iroh would layer NAT-traversal onto; deterministic, no flake).
        run: cargo test -p hologram-net --features live,tcp,quic

      - name: RZ gate — compute engine absent from store/route crates
        run: |
          set -euo pipefail
          for c in hologram-space hologram-tck hologram-store \
                   hologram-net hologram-runtime; do
            if cargo tree -p "$c" -e normal | grep -E "hologram-(exec|compute|ops|graph|compiler|archive)"; then
              echo "RZ VIOLATION: compute engine reachable from $c"; exit 1
            fi
            echo "  $c: RZ ok"
          done

      - name: no_std tri-target — substrate builds for browser + bare-metal (TR class)
        run: |
          # The portable store/net + the wasmi runtime (no_std interpreter) build for browser + bare
          # metal. The runtime needs its engine-wasmi feature, so it builds as a separate invocation.
          for target in wasm32-unknown-unknown thumbv7em-none-eabi; do
            cargo build --target "$target" --no-default-features \
              -p hologram-space -p hologram-net
            cargo build --target "$target" --no-default-features \
              --features bare -p hologram-store
            cargo build --target "$target" --no-default-features \
              --features engine-wasmi -p hologram-runtime
          done

      - name: Real-world examples (runnable capability narratives)
        run: |
          for ex in cas_artifact_cache event_bus least_privilege wasm_inference_container live_migration; do
            cargo run -q -p hologram-runtime --features engine-wasmtime --example "$ex"
          done

  # Exit-criteria demos (spec 06): the P4/P5/P6 acceptance narratives, run in-process as
  # deterministic examples (always-green). P4 = multi-layer .holo app; P5 = restricted network with
  # a non-member refused at the protocol boundary; P6 = private-network confidentiality + dedup. The
  # live browser-peer / multi-node transport variants remain the heavy-CI demos (holospaces-vv-heavy).
  exit-criteria-demos:
    name: Exit-criteria demos (P4/P5/P6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: exit-criteria-demos

      - name: Run the P4/P5/P6 exit-criteria demos
        run: |
          cargo run -p hologram-space --example multi_layer_app
          cargo run -p hologram-space --example restricted_network
          cargo run -p hologram-space --example private_confidentiality

  # κ-Distribution conformance (spec 003) — the KD ledger class, built out level-by-level.
  # **NON-BLOCKING BY DESIGN:** intentionally absent from `ci-success.needs` (mirrors how
  # `docs-conformance` was introduced non-blocking before promotion). It exercises the feature-gated
  # `/v2/` registry binding (`hologram-net --features kd`) that the always-green blocking jobs never
  # compile, so the protocol can grow (L1→L5) without gating the first `uor-hologram` release. It is
  # promoted into `ci-success.needs` at ratification (plan Phase 8), at which point the KD-* rows flip
  # 🟡→✅.
  kd-conformance:
    name: κ-Distribution conformance (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: kd-conformance

      - name: KD Levels 1-2 — /v2/ blobs (verify-on-put · idempotent · multi-label · chunked upload + recovery · mount) + tags (bind/resolve/list/CAS · κ-only Law-2 guard)
        run: cargo test -p hologram-net --features kd --lib

      - name: KD standard crate — canonical forms + error taxonomy + levels (uor-distribution)
        run: |
          cargo test --manifest-path crates/uor-distribution/Cargo.toml
          cargo build --manifest-path crates/uor-distribution/Cargo.toml --no-default-features
          cargo clippy --manifest-path crates/uor-distribution/Cargo.toml --all-targets -- -D warnings

      - name: KD Levels 3-5 — registry service (edges · composition/witness/schema · GC/finalizers/admission/federation; hologram-registry)
        run: |
          cargo test --manifest-path crates/hologram-registry/Cargo.toml
          cargo clippy --manifest-path crates/hologram-registry/Cargo.toml --all-targets -- -D warnings

  # Job 17: Verify all quality gates passed
  ci-success:
    name: CI Success
    if: always()
    needs:
      - format
      - clippy
      - test
      - docs
      - security
      - cross-targets
      - vv
      - tooling-tests
      - substrate
      - exit-criteria-demos
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly: re-run the heavy holospaces V&V (CC tier) and catch artifact-pin rot.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: Check formatting
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  # Job 2: Clippy linting
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Job 3: Test
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.os }}-test

      # holospaces' CC integration tests need the vv/artifacts fixtures + Linux tools (e2fsprogs,
      # qemu, docker); on a generic runner where a tool is present but the fixture isn't, some
      # would try to read the fixture rather than skip. They are comprehensively gated by the
      # holospaces-vv-heavy job (fixtures materialized), so exclude the space from the generic
      # matrix test; its lib/unit tests run in holospaces-vv-heavy.
      - name: Run tests
        run: cargo test --workspace --exclude holospaces

      - name: Run doc tests
        run: cargo test --workspace --exclude holospaces --doc

  # Job 5: Documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: docs

      - name: Build documentation
        # Use --lib to only document libraries, avoiding filename collision
        # between the 'hologram' library crate and 'hologram' CLI binary
        run: cargo doc --workspace --no-deps --lib
        env:
          # Allow specific doc warnings that have many false positives:
          # - broken_intra_doc_links: Square brackets in math expressions
          # - invalid_html_tags: Angle brackets in type expressions
          # Add AVX2 for x86_64 (required by compile-time guard in prism::channel)
          RUSTDOCFLAGS: "-D warnings -A rustdoc::broken_intra_doc_links -A rustdoc::invalid_html_tags -C target-feature=+avx2"

  # Job 7: Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Job 8: Cross-compilation targets (WASM, aarch64)
  # Cross-compilation targets (wasm32, aarch64).
  #
  # The no_std crates form the portable core that must build for every
  # supported target. std-only crates (hologram-backend / -exec /
  # -compiler / -ffi / -cli / -bench / -archive) depend on libc / threads
  # / mmap and are intentionally NOT cross-targeted; their CI coverage
  # is the matrix-`test` job.
  cross-targets:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - wasm32-unknown-unknown
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # blake3 (transitive via uor-prism-crypto -> prism::crypto::Blake3Hasher)
      # turns on NEON assembly when the target is aarch64 and needs an
      # aarch64-linux-gnu cross-cc to compile the C wrapper. ubuntu-latest
      # ships gcc-aarch64-linux-gnu in apt — wire it through via
      # CARGO_TARGET_<TARGET>_LINKER + CC_<target> so the cc crate picks
      # it up. wasm32 builds compile blake3's portable path and need no
      # additional toolchain.
      - name: Install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          # The GitHub runner image ships third-party apt sources
          # (packages.microsoft.com / azure-cli) that intermittently fail
          # signature verification and abort `apt-get update`. They are
          # irrelevant to the cross toolchain, so drop them first so a broken
          # upstream repo cannot flake this job.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources || true
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: cross-${{ matrix.target }}

      - name: Check no_std core
        run: |
          cargo check --target ${{ matrix.target }} \
            -p hologram-types \
            -p hologram-ops \
            -p hologram-graph

  # Job 9: V&V suites the debug `cargo test --workspace` (the `test` job) does
  # not exercise — enforcing the full CONFORMANCE.md catalog on every push:
  #   * PV (performance floors): release-only (`#![cfg(not(debug_assertions))]`),
  #     so they compile to zero tests in debug.
  #   * PA (parallel-execution conformance): gated behind `--features parallel`.
  #   * AS/MA (external-authority model-format conformance): gated behind
  #     `--features model-formats`.
  # Mirrors the `parallel`, `perf`, and `conformance` targets of `just vv`.
  vv:
    name: V&V (perf + parallel + model-formats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: vv

      - name: CC bijection audit + honesty meta-gate + BDD (MG-7, artifact-free)
        run: cargo test -p hologram-conformance --test cc_gate --test meta_gate --test bdd

      - name: External-authority + scaling conformance (model-formats)
        run: |
          cargo test -p hologram-archive --test conformance --test model_address --features model-formats
          cargo test -p hologram-backend --test conformance --features cpu
          cargo test -p hologram-exec --test conformance

      - name: Parallel-execution conformance (--features parallel)
        run: cargo test -p hologram-backend --features cpu,parallel --test parallel --test conformance --lib cpu::parallel

      - name: Performance floors (release-only, PV class)
        run: |
          cargo test --release -p hologram-backend --test performance --features cpu -- --nocapture
          cargo test --release -p hologram-exec --test performance -- --nocapture

  # Job 10: Quality-gate tooling tests — the gates' own Python/shell logic
  # (regression compare, benchmark lifecycle, best-of-N, API changelog, and the
  # release API-history flow). No Rust toolchain needed, so it's fast.
  tooling-tests:
    name: Quality-gate tooling tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Tooling unit tests
        run: python3 scripts/test_quality_gates.py
      - name: Release API-history flow test
        run: bash scripts/test-release-tooling.sh

  # Job 11: Deployment-substrate V&V — the container substrate's own conformance
  # catalog (CR/ST/SP/NW/HAL/CM/DI/RB/TR/SPINE classes; see
  # specs/docs/container-substrate-vv.md), which `cargo test --workspace` does
  # not fully exercise: the live HTTP-CAS transport (--features live), the RZ
  # gate (the tensor compute engine must be absent from store/route crates), the
  # no_std tri-target builds, and the runnable real-world examples. Mirrors the
  # `vv-substrate` + `examples` recipes of the Justfile.
  substrate:
    name: Substrate V&V (storage · runtime · network)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, thumbv7em-none-eabi

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: substrate

      # Crate names updated for the post-refactor consolidation: substrate-core / realizations /
      # bare-hal → hologram-space; store-mem / substrate-tck → hologram-tck; net-{http,tcp,bare} →
      # hologram-net; runtime-{bare,wasmtime} → hologram-runtime (engine-wasmi / engine-wasmtime
      # features); substrate-cli → hologram-cli. (Mappings + no_std feature flags verified locally.)
      - name: Conformance + worked-example battery
        run: |
          cargo test \
            -p hologram-space -p hologram-tck \
            -p hologram-store-native -p hologram-store-bare \
            -p hologram-net -p hologram-runtime -p hologram-cli

      - name: Live HTTP-CAS transport (NW class, --features live)
        # `tcp` too, so the tokio-backed uor-native DHT test in the consolidated hologram-net
        # (was hologram-net-tcp) compiles alongside the live HTTP-CAS transport.
        run: cargo test -p hologram-net --features live,tcp

      - name: RZ gate — compute engine absent from store/route crates
        run: |
          set -euo pipefail
          for c in hologram-space hologram-tck hologram-store-native hologram-store-bare \
                   hologram-net hologram-runtime; do
            if cargo tree -p "$c" -e normal | grep -E "hologram-(exec|backend|ops|graph|compiler|archive)"; then
              echo "RZ VIOLATION: compute engine reachable from $c"; exit 1
            fi
            echo "  $c: RZ ok"
          done

      - name: no_std tri-target — substrate builds for browser + bare-metal (TR class)
        run: |
          # The portable store/net + the wasmi runtime (no_std interpreter) build for browser + bare
          # metal. The runtime needs its engine-wasmi feature, so it builds as a separate invocation.
          for target in wasm32-unknown-unknown thumbv7em-none-eabi; do
            cargo build --target "$target" --no-default-features \
              -p hologram-space -p hologram-net -p hologram-store-bare
            cargo build --target "$target" --no-default-features \
              --features engine-wasmi -p hologram-runtime
          done

      - name: Real-world examples (runnable capability narratives)
        run: |
          for ex in cas_artifact_cache event_bus least_privilege wasm_inference_container live_migration; do
            cargo run -q -p hologram-runtime --features engine-wasmtime --example "$ex"
          done

  # Job 12: End-to-end bare-metal boot (BOOT class) — build hologram.efi and boot
  # it in QEMU/OVMF with no OS underneath, asserting the engine's storage
  # self-check prints PASS on the UEFI console. Mirrors the `uefi-boot` recipe.
  substrate-uefi-boot:
    name: Bare-metal UEFI boot (QEMU/OVMF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi

      - name: Install QEMU + OVMF firmware
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources || true
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: substrate-uefi
          workspaces: crates/hologram-efi

      - name: Boot hologram.efi and assert PASS
        run: ./scripts/uefi-boot-test.sh

  # Job 13: End-to-end browser OPFS store (OPFS class) — build the wasm32 store,
  # generate JS glue, and exercise put/get round-trip + reload persistence +
  # verify-on-receipt in real Chromium via Playwright. Mirrors the `opfs-test` recipe.
  substrate-opfs:
    name: Browser OPFS store (Chromium/Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: substrate-opfs

      - name: Install wasm-bindgen-cli (pinned to the crate's wasm-bindgen)
        run: cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Install Playwright Chromium
        run: |
          cd crates/hologram-store-opfs/web
          npm install
          npx --yes playwright install --with-deps chromium

      - name: Run OPFS test in Chromium
        run: ./scripts/opfs-browser-test.sh

  # Job 14: holospaces V&V — the full component-conformance (CC) tier (MG-7). Boots real
  # OSes on the emulator under a QEMU differential (RISC-V / AArch64 / x86-64), assembles
  # ext4/OCI rootfs (e2fsprogs), and drives the browser workbench via Playwright — all against
  # the 170M vv/artifacts/ tree materialized on demand from the pinned holospaces revision
  # (scripts/vv-fetch.sh). This is the gate that makes MG-7's ✅ mean "all 45 CC pass in CI".
  #
  # BLOCKING (in ci-success.needs, MG-7 Phase F): the CC V&V — all 45 cargo-witnessed CC + the
  # QEMU boots + the browser workbench suites — must be green to merge. Validated locally green
  # (holospaces at ../holospaces): every cargo CC witness + all QEMU Linux boots + the browser
  # suites pass; three post-port browser-workbench suites (SCM/search/tasks) are quarantined
  # non-gating in vv/run.sh (tracked). This branch (chore/refactor) does not trigger CI, so the
  # first real CI validation happens at the PR to main; run it early via `workflow_dispatch`.
  # holospaces is public, so the default token fetches the artifact source (override with the
  # HOLOSPACES_ARTIFACTS_TOKEN secret if needed).
  holospaces-vv-heavy:
    name: holospaces V&V (CC — QEMU · e2fsprogs · Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Read + validate the V&V artifact pin
        id: pin
        run: |
          sha="$(tr -d '[:space:]' < vv/ARTIFACTS_PIN)"
          case "$sha" in
            [0-9a-f]*) [ "${#sha}" -eq 40 ] || { echo "pin is not a 40-hex sha: $sha" >&2; exit 1; } ;;
            *) echo "pin is not a lowercase hex sha: $sha" >&2; exit 1 ;;
          esac
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout holospaces (V&V artifact source, pinned + validated)
        uses: actions/checkout@v6
        with:
          repository: Hologram-Technologies/holospaces
          ref: ${{ steps.pin.outputs.sha }}
          path: holospaces-src
          token: ${{ secrets.HOLOSPACES_ARTIFACTS_TOKEN || github.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, thumbv7em-none-eabi

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install QEMU (riscv64 · aarch64 · x86-64 · user) + e2fsprogs + OVMF
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources || true
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-misc qemu-system-arm qemu-system-x86 qemu-user \
            e2fsprogs ovmf gcc-aarch64-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: holospaces-vv-heavy

      - name: Install wasm-pack + wasm-bindgen-cli (browser CC suites)
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Cache V&V artifacts (170M, keyed on the pin)
        uses: actions/cache@v4
        with:
          path: vv/artifacts
          key: vv-artifacts-${{ steps.pin.outputs.sha }}

      - name: Materialize + verify V&V artifacts (from the pinned holospaces checkout)
        env:
          HOLOSPACES_DIR: ${{ github.workspace }}/holospaces-src
        run: bash scripts/vv-fetch.sh

      - name: Install Playwright Chromium
        run: npx --yes playwright install --with-deps chromium

      - name: Run the CC V&V (all 45 — fast · artifact · QEMU boots · browser)
        env:
          CC_ONLY: "1"
          HOLOSPACES_SKIP_PERF: "1"
        run: bash vv/run.sh

      - name: Ledger heavy witnesses without a dedicated vv/ suite (CC-31, CC-51)
        # These `#[ignore]`d witnesses have no vv/suites/ entry, so vv/run.sh doesn't reach them;
        # run them explicitly so the CC-31/CC-51 ledger rows are CI-gated. (CC-45's dogfood needs
        # ~24 GB + a real Dev Container build — vv/heavy/, not gated here; its row stays 🟡.)
        run: |
          cargo test -p holospaces --release --test cc31_resume_terminal -- --ignored \
            --exact a_resumed_idle_devcontainer_is_live_and_its_scrollback_is_a_terminal_concern
          cargo test -p holospaces --release --test cc51_nested_workspace -- --ignored \
            --exact the_host_and_os_share_a_nested_workspace_tree_over_virtio_9p

      - name: holospaces lib/unit tests (excluded from the generic matrix test)
        run: cargo test -p holospaces --lib

  # Job 15: CS docs conformance (MG-7 Phase G4 / MG-8). Validates the holospaces documentation
  # (arc42 / C4 / OPM ISO 19450 / ISO 15288) against its external standards via validators V1–V8.
  # Needs the docs toolchain — JDK 21, Ruby 3, Structurizr, cmark-gfm, pandoc — provisioned here.
  # NOT yet in ci-success.needs: introduced non-blocking (the toolchain isn't locally verifiable),
  # promoted to blocking + MG-8 flipped ✅ once observed green (run via workflow_dispatch / the PR).
  docs-conformance:
    name: CS docs conformance (arc42 · C4 · OPM · ISO 15288 — V1–V8)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive   # fetch specs/holospaces/vendor/arc42-generator (pinned)

      - name: Setup JDK 21 (Structurizr's Java exporter)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Ruby 3 (the V1/V5/V6/V7 validators + Bundler)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: specs/holospaces
          bundler-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install the docs toolchain (Structurizr · cmark-gfm · pandoc · playwright)
        working-directory: specs/holospaces
        run: bash scripts/install-tools.sh

      - name: Run the docs V&V (V1–V8 — build.sh)
        working-directory: specs/holospaces
        run: bash scripts/build.sh

  # Job 16: Verify all quality gates passed
  ci-success:
    name: CI Success
    if: always()
    needs:
      - format
      - clippy
      - test
      - docs
      - security
      - cross-targets
      - vv
      - tooling-tests
      - substrate
      - substrate-uefi-boot
      - substrate-opfs
      - holospaces-vv-heavy
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1

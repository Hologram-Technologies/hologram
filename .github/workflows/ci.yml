name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: Check formatting
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  # Job 2: Clippy linting
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Job 3: Test
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.os }}-test

      - name: Run tests
        run: cargo test --workspace

      - name: Run doc tests
        run: cargo test --workspace --doc

  # Job 5: Documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: docs

      - name: Build documentation
        # Use --lib to only document libraries, avoiding filename collision
        # between the 'hologram' library crate and 'hologram' CLI binary
        run: cargo doc --workspace --no-deps --lib
        env:
          # Allow specific doc warnings that have many false positives:
          # - broken_intra_doc_links: Square brackets in math expressions
          # - invalid_html_tags: Angle brackets in type expressions
          # Add AVX2 for x86_64 (required by compile-time guard in prism::channel)
          RUSTDOCFLAGS: "-D warnings -A rustdoc::broken_intra_doc_links -A rustdoc::invalid_html_tags -C target-feature=+avx2"

  # Job 7: Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Job 8: Cross-compilation targets (WASM, aarch64)
  # Cross-compilation targets (wasm32, aarch64).
  #
  # The no_std crates form the portable core that must build for every
  # supported target. std-only crates (hologram-backend / -exec /
  # -compiler / -ffi / -cli / -bench / -archive) depend on libc / threads
  # / mmap and are intentionally NOT cross-targeted; their CI coverage
  # is the matrix-`test` job.
  cross-targets:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - wasm32-unknown-unknown
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # blake3 (transitive via uor-prism-crypto -> prism::crypto::Blake3Hasher)
      # turns on NEON assembly when the target is aarch64 and needs an
      # aarch64-linux-gnu cross-cc to compile the C wrapper. ubuntu-latest
      # ships gcc-aarch64-linux-gnu in apt — wire it through via
      # CARGO_TARGET_<TARGET>_LINKER + CC_<target> so the cc crate picks
      # it up. wasm32 builds compile blake3's portable path and need no
      # additional toolchain.
      - name: Install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: cross-${{ matrix.target }}

      - name: Check no_std core
        run: |
          cargo check --target ${{ matrix.target }} \
            -p hologram-types \
            -p hologram-host \
            -p hologram-ops \
            -p hologram-graph

  # Job 9: V&V suites the debug `cargo test --workspace` (the `test` job) does
  # not exercise — enforcing the full CONFORMANCE.md catalog on every push:
  #   * PV (performance floors): release-only (`#![cfg(not(debug_assertions))]`),
  #     so they compile to zero tests in debug.
  #   * PA (parallel-execution conformance): gated behind `--features parallel`.
  #   * AS/MA (external-authority model-format conformance): gated behind
  #     `--features model-formats`.
  # Mirrors the `parallel`, `perf`, and `conformance` targets of `just vv`.
  vv:
    name: V&V (perf + parallel + model-formats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: vv

      - name: External-authority + scaling conformance (model-formats)
        run: |
          cargo test -p hologram-archive --test conformance --test model_address --features model-formats
          cargo test -p hologram-backend --test conformance --features cpu
          cargo test -p hologram-exec --test conformance

      - name: Parallel-execution conformance (--features parallel)
        run: cargo test -p hologram-backend --features cpu,parallel --test parallel --test conformance --lib cpu::parallel

      - name: Performance floors (release-only, PV class)
        run: |
          cargo test --release -p hologram-backend --test performance --features cpu -- --nocapture
          cargo test --release -p hologram-exec --test performance -- --nocapture

  # Job 10: Verify all quality gates passed
  ci-success:
    name: CI Success
    if: always()
    needs:
      - format
      - clippy
      - test
      - docs
      - security
      - cross-targets
      - vv
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1

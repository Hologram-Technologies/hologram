[package]
name = "hologram-compiler"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Compilation pipeline: Graph → optimized .holo archive"

[dependencies]
hologram-core = { workspace = true }
hologram-ir = { workspace = true }
hologram-archive = { workspace = true }
hologram-fused-component = { workspace = true }
hologram-foundation = { path = "../hologram-foundation" }
hologram-shapes = { path = "../hologram-shapes" }
blake3 = { workspace = true }
rayon = { workspace = true, optional = true }

[features]
parallel = ["dep:rayon", "hologram-ir/parallel", "hologram-archive/parallel"]

[package]
name = "hologram-compiler"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Compilation pipeline: Graph → optimized .holo archive"

[dependencies]
hologram-core = { workspace = true }
hologram-graph = { workspace = true }
hologram-archive = { workspace = true }
rayon = { workspace = true, optional = true }

[features]
parallel = ["dep:rayon", "hologram-graph/parallel", "hologram-archive/parallel"]

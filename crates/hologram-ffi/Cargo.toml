[package]
name = "hologram-ffi"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "FFI layer: C ABI (extern C, cbindgen) + WASM (wasm-bindgen, feature-gated)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
hologram-core = { workspace = true }
hologram-graph = { workspace = true }
hologram-archive = { workspace = true }
hologram-exec = { workspace = true }
hologram-compiler = { workspace = true }
hologram-compression = { workspace = true, optional = true }

wasm-bindgen = { workspace = true, optional = true }
js-sys = { version = "0.3", optional = true }

[features]
default = ["compression"]
wasm = ["wasm-bindgen", "js-sys"]
compression = ["dep:hologram-compression"]

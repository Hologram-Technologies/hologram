[package]
name = "hologram-exec"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "KV-lookup execution engine with parallel level scheduling"

[dependencies]
hologram-core = { workspace = true }
hologram-graph = { workspace = true }
hologram-ops = { workspace = true }
hologram-backend = { path = "../hologram-backend" }
hologram-shape = { path = "../hologram-shape" }
hologram-ring = { workspace = true, features = ["std"] }
hologram-archive = { workspace = true }
rkyv = { workspace = true }
bytemuck = { workspace = true }
smallvec = { workspace = true }
tracing = "0.1"
parking_lot = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dependencies.rayon]
workspace = true
optional = true

[features]
default = ["std"]
std = ["hologram-archive/std"]
parallel = ["rayon"]
accelerate = []
profile = []

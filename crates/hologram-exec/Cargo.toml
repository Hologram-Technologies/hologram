[package]
name = "hologram-exec"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "KV-lookup execution engine with parallel level scheduling"

[dependencies]
hologram-core = { workspace = true }
hologram-graph = { workspace = true }
hologram-archive = { workspace = true }
rkyv = { workspace = true }
bytemuck = { workspace = true }
smallvec = { workspace = true }

[dependencies.rayon]
workspace = true
optional = true

[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.33"

[features]
default = ["std"]
std = ["hologram-archive/std"]
parallel = ["rayon"]
accelerate = []
profile = []

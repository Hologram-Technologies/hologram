[package]
name = "hologram-exec"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Hologram runtime executor: InferenceSession + Executor + BufferArena."

[dependencies]
hologram-host    = { workspace = true }
hologram-backend = { workspace = true }
hologram-archive = { workspace = true }
hologram-graph   = { workspace = true }
thiserror        = { workspace = true }
parking_lot      = { workspace = true }
tracing          = { workspace = true }
tokio            = { workspace = true, optional = true }

[dev-dependencies]
hologram-compiler = { workspace = true }
hologram-graph    = { workspace = true }
uor-foundation    = { workspace = true }

[features]
default = []
async = ["dep:tokio"]

[package]
name = "hologram-exec"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "KV-lookup execution engine with parallel level scheduling"

[dependencies]
hologram-core = { workspace = true }
hologram-graph = { workspace = true }
hologram-ring = { workspace = true, features = ["std"] }
hologram-archive = { workspace = true }
rkyv = { workspace = true }
bytemuck = { workspace = true }
smallvec = { workspace = true }
tracing = "0.1"
parking_lot = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dependencies.rayon]
workspace = true
optional = true

[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.33"

[dependencies.wgpu]
workspace = true
optional = true

[dependencies.pollster]
workspace = true
optional = true

[features]
default = ["std"]
std = ["hologram-archive/std"]
parallel = ["rayon"]
accelerate = []
profile = []
webgpu = ["wgpu", "pollster"]


[package]
name = "hologram-spike-sp3"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "P0.5 de-risk spike (D28): a minimal Client over the Space contract proving compile→store→boot composes on native and wasm32. The SP-3 witness; superseded by the real Client in P1."
publish = false

[dependencies]
hologram-space          = { workspace = true }
hologram-tck      = { workspace = true }
hologram-compiler       = { workspace = true }
hologram-exec           = { workspace = true }
hologram-backend        = { workspace = true, features = ["cpu"] }
hologram-graph          = { workspace = true }
uor-prism               = { workspace = true }
smallvec                = { workspace = true }
async-trait             = { workspace = true }

[features]
default = ["std"]
std = [
    "hologram-space/std",
    "hologram-tck/std",
    "hologram-compiler/std",
    "hologram-exec/std",
    "hologram-backend/std",
]

[dev-dependencies]
pollster = { workspace = true }

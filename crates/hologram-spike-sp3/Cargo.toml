[package]
name = "hologram-spike-sp3"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "A reference external-crate `Space` implementation (`SpikeSpace`) used to witness LAW-3 (the space contract is open, D21) and SP-3 (composition) against the real `hologram::Client`. Formerly the P0.5 spike (D28); its throwaway Client was superseded by the real one."
publish = false

[dependencies]
hologram-space          = { workspace = true }
# The container runtime (`Runtime<MockEngine, MemKappaStore>`) SpikeSpace exposes as its
# `Space::Runtime`, so a Client can drive an open→boot→suspend Session over it.
hologram-runtime        = { workspace = true }
async-trait             = { workspace = true }

[features]
default = ["std"]
std = ["hologram-space/std", "hologram-runtime/std"]

[package]
name = "hologram-conformance"
version.workspace = true
edition.workspace = true
publish = false
description = "BDD (cucumber) conformance runner + honesty meta-gate for the hologram refactor."

[lib]
doctest = false

[dependencies]
cucumber = "0.21"

[dev-dependencies]
tokio = { workspace = true }
# GV-1 (R1 traceability) is witnessed against the existing substrate realizations:
# a ContainerManifest embeds its operand κs and references() recovers exactly them.
hologram-substrate-core = { path = "../../substrate/hologram-substrate-core" }
hologram-realizations = { path = "../../substrate/hologram-realizations" }
# SP-3 (space composition) is witnessed against the P0.5 spike slice: a Client over the
# Space contract drives compile→store→boot through the async↔sync boundary.
hologram-spike-sp3 = { path = "../hologram-spike-sp3" }
# SP-1 (passing the TCK is conformance) runs the shared conformance battery against the
# reference store — the same battery every backend runs (substrate-tripling discipline).
hologram-tck = { path = "../hologram-tck" }
hologram-store-mem = { path = "../../substrate/hologram-store-mem" }

[[test]]
name = "bdd"
harness = false

[[test]]
name = "meta_gate"
harness = true

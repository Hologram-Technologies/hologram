[package]
name = "hologram-conformance"
version.workspace = true
edition.workspace = true
publish = false
description = "BDD (cucumber) conformance runner + honesty meta-gate for the hologram refactor."

[lib]
doctest = false

[dependencies]
cucumber = "0.21"

[dev-dependencies]
tokio = { workspace = true }
# GV-1 (R1 traceability) is witnessed against the existing substrate realizations:
# a ContainerManifest embeds its operand κs and references() recovers exactly them.
hologram-substrate-core = { path = "../../substrate/hologram-substrate-core" }
hologram-realizations = { path = "../../substrate/hologram-realizations" }

[[test]]
name = "bdd"
harness = false

[[test]]
name = "meta_gate"
harness = true

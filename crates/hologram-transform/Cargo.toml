[package]
name = "hologram-transform"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "LUT-addressed transformation / mutation chains: chain → plan → execute"

[dependencies]
hologram-ops = { workspace = true }
smallvec = { workspace = true }
thiserror = "2"

[dev-dependencies]
hologram-ops = { workspace = true }
libm = { workspace = true }

[features]
default = []
# Forward `hologram-ops/parallel` so downstream crates can enable
# threaded matmul without depending on `hologram-ops` directly.
parallel = ["hologram-ops/parallel"]

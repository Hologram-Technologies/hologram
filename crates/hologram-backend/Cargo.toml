[package]
name = "hologram-backend"
version = "0.1.0"
edition = "2024"
description = "Device-native compute backends for hologram execution"
license = "MIT OR Apache-2.0"

[dependencies]
hologram-core = { path = "../hologram-core" }
smallvec = "1"
tracing = "0.1"
thiserror = "2"

# CPU backend: Accelerate BLAS on macOS
[target.'cfg(target_os = "macos")'.dependencies]

[features]
default = []
# Metal backend (macOS / iOS)
metal-backend = ["dep:metal", "dep:objc"]
# WebGPU backend (browser + wgpu)
webgpu-backend = ["dep:wgpu"]

[dependencies.metal]
version = "0.33"
optional = true

[dependencies.objc]
version = "0.2"
optional = true

[dependencies.wgpu]
version = "24"
optional = true

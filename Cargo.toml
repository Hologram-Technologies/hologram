[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["UOR Foundation"]

[workspace.dependencies]
# Internal crates
hologram-core = { path = "crates/hologram-core" }
hologram-graph = { path = "crates/hologram-graph" }
hologram-archive = { path = "crates/hologram-archive" }
hologram-exec = { path = "crates/hologram-exec" }
hologram-compiler = { path = "crates/hologram-compiler" }
hologram-async = { path = "crates/hologram-async" }
hologram-cli = { path = "crates/hologram-cli" }
hologram-ffi = { path = "crates/hologram-ffi" }

# UOR Foundation
uor-foundation = { git = "https://github.com/UOR-Foundation/UOR-Framework", rev = "bfe21f4" }

# Serialization (rkyv only)
rkyv = { version = "0.8" }
bytemuck = { version = "1.14", features = ["derive"] }

# Parallelism
rayon = "1.8"

# Archive support
memmap2 = "0.9"
crc32fast = "1.4"

# Data structures
smallvec = "1.13"

# Async runtime
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }

# JSON output (CLI only)
serde_json = "1"

# Benchmarking
criterion = "0.5"

# FFI
wasm-bindgen = "0.2"

[package]
name = "hologram"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "O(1) compute acceleration via pre-computed lookup tables"

[[bin]]
name = "hologram"
path = "src/main.rs"
required-features = ["cli"]

[[test]]
name = "e2e"
required-features = ["ffi"]

[dependencies]
# Always included: core execution stack
hologram-core = { workspace = true }
hologram-graph = { workspace = true }
hologram-archive = { workspace = true }
hologram-exec = { workspace = true }
rkyv = { workspace = true }
bytemuck = { workspace = true }

# Optional: compilation pipeline
hologram-compiler = { workspace = true, optional = true }

# Optional: async execution wrappers (requires tokio)
hologram-async = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

# Optional: C ABI + WASM bindings
hologram-ffi = { workspace = true, optional = true }

# Optional: command-line interface
hologram-cli = { workspace = true, optional = true }

[features]
default = ["std", "simd", "parallel", "compiler", "accelerate"]
full = ["default", "async", "ffi", "cli"]

std = ["hologram-core/std", "hologram-exec/std"]
simd = ["hologram-core/simd"]
parallel = ["hologram-exec/parallel"]
accelerate = ["hologram-exec/accelerate"]

compiler = ["dep:hologram-compiler"]
async = ["dep:hologram-async", "dep:tokio"]
ffi = ["dep:hologram-ffi"]
cli = ["dep:hologram-cli", "dep:tokio"]
wasm = ["ffi", "hologram-ffi/wasm"]

# Keep debug symbols but optimize enough for usable LLM inference (~10-50x faster).
[profile.dev]
opt-level = 2

[profile.release]
opt-level = 3
strip = true
lto = true
codegen-units = 1

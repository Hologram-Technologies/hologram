[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.4.1"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["UOR Foundation"]

[workspace.dependencies]
# Internal crates
hologram-core = { path = "crates/hologram-core", default-features = false }
hologram-ir = { path = "crates/hologram-ir" }
hologram-archive = { path = "crates/hologram-archive" }
hologram-shapes = { path = "crates/hologram-shapes" }
hologram-fused-component = { path = "crates/hologram-fused-component" }
hologram-compiler = { path = "crates/hologram-compiler" }
hologram-async = { path = "crates/hologram-async" }
hologram-cli = { path = "crates/hologram-cli" }
hologram-ffi = { path = "crates/hologram-ffi" }
# Compression
hologram-compression = { path = "crates/hologram-compression" }

# Ring foundation (parametric ring algebra)
hologram-ring = { path = "crates/hologram-ring", default-features = false }

# UOR Foundation v0.2.0 lives behind the hologram-foundation re-export shim;
# the workspace no longer pins v0.1.4 directly. Crates that need v0.2.0 types
# depend on `hologram-foundation` (a path dep, not a workspace dep).

# Serialization (rkyv only)
rkyv = { version = "0.8", features = ["tinyvec-1"] }
bytemuck = { version = "1.14", features = ["derive"] }

# Parallelism
rayon = "1.8"
parking_lot = "0.12"

# Archive support
memmap2 = "0.9"
blake3 = "1"

# Data structures
smallvec = "1.13"
tinyvec = { version = "1.10", features = ["alloc"] }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
clap = { version = "4", features = ["derive"] }

# Serialization / config
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Math (no_std transcendental functions)
libm = "0.2"

# Benchmarking
criterion = "0.5"

# FFI
wasm-bindgen = "0.2"

# GPU (optional)
wgpu = "23"
pollster = "0.4"


[package]
name = "hologram"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "O(1) compute acceleration via pre-computed lookup tables"

[[bin]]
name = "hologram"
path = "src/main.rs"
required-features = ["cli"]

[[test]]
name = "e2e"
required-features = ["ffi"]

[dependencies]
# Always included: core execution stack
hologram-core = { workspace = true }
hologram-ir = { workspace = true }
hologram-archive = { workspace = true }
hologram-shapes = { workspace = true }
hologram-fused-component = { workspace = true }
rkyv = { workspace = true }
bytemuck = { workspace = true }
serde = { workspace = true, optional = true }
toml = { workspace = true, optional = true }

# Optional: compilation pipeline
hologram-compiler = { workspace = true, optional = true }

# Optional: async execution wrappers (requires tokio)
hologram-async = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

# Optional: C ABI + WASM bindings
hologram-ffi = { workspace = true, optional = true }

# Optional: command-line interface
hologram-cli = { workspace = true, optional = true }

[features]
default = ["std", "simd", "parallel", "compiler", "accelerate"]
full = ["default", "async", "ffi", "cli"]

std = ["hologram-core/std", "hologram-fused-component/std"]
simd = ["hologram-core/simd"]
parallel = ["hologram-fused-component/parallel", "hologram-ir/parallel", "hologram-archive/parallel", "hologram-compiler?/parallel"]
accelerate = ["hologram-fused-component/accelerate"]
profile = ["hologram-fused-component/profile"]

compiler = ["dep:hologram-compiler"]
async = ["dep:hologram-async", "dep:tokio"]
ffi = ["dep:hologram-ffi"]
cli = ["dep:hologram-cli", "dep:tokio", "dep:serde", "dep:toml"]
wasm = ["ffi", "hologram-ffi/wasm"]

# Keep debug symbols but optimize enough for usable LLM inference (~10-50x faster).
[profile.dev]
opt-level = 2

[profile.release]
opt-level = 3
strip = true
lto = true
codegen-units = 1

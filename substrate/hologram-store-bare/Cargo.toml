[package]
name = "hologram-store-bare"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
description = "Bare-metal KappaStore over a BlockDevice (bare-metal spec §5): formats and persists the κ→bytes map on raw sectors, no filesystem. no_std + alloc; passes the shared TCK over a RAM block device."

[dependencies]
hologram-substrate-core = { workspace = true }
hologram-bare-hal       = { workspace = true }
hashbrown               = { workspace = true }
spin                    = { workspace = true }

[dev-dependencies]
hologram-substrate-tck = { workspace = true }
hologram-realizations  = { workspace = true }

[features]
default = []
std = ["hologram-substrate-core/std"]

[package]
name = "hologram-store-bare"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
description = "Bare-metal KappaStore over a BlockDevice (bare-metal spec §5): formats and persists the κ→bytes map on raw sectors, no filesystem. no_std + alloc; passes the shared TCK over a RAM block device."

[dependencies]
hologram-space       = { workspace = true }
# `hologram-types` is reused for the σ-axis Hasher (architecture G-E1); the bare-metal store
# verifies each κ-page against the same BLAKE3 path as the rest of the substrate.
hologram-types           = { workspace = true }
hashbrown               = { workspace = true }
spin                    = { workspace = true }

[dev-dependencies]
hologram-tck = { workspace = true }
pollster               = { workspace = true }

[features]
default = []
std = ["hologram-space/std"]

[package]
name = "hologram-net-tcp"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
description = "uor-native TCP KappaSync — content-addressed networking without PeerIds or Multiaddrs. Implements κ-XOR Kademlia DHT over a raw TCP transport with append-only wire framing and verify-on-receipt at every hop (SPINE-4). Replaces hologram-net-libp2p, whose PeerId / Multiaddr layer was a second non-κ naming surface (SPINE-1 violation)."

[dependencies]
hologram-space = { workspace = true }
async-trait              = { workspace = true }
tokio                    = { version = "1", features = ["net", "rt-multi-thread", "macros", "sync", "io-util", "time"] }

[dev-dependencies]
hologram-store-mem = { workspace = true }
pollster           = { workspace = true }

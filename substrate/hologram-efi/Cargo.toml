[package]
name = "hologram-efi"
version = "0.5.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["UOR Foundation"]
description = "hologram.efi — the bare-metal UEFI boot binary (bare-metal spec §3). Boots from UEFI firmware, brings up the engine over a block device, and exercises BareMetalKappaStore. Built for x86_64-unknown-uefi; booted in QEMU/OVMF."

[[bin]]
name = "hologram"
path = "src/main.rs"

[dependencies]
hologram-substrate-core = { path = "../hologram-substrate-core", default-features = false }
hologram-space = { path = "../../crates/hologram-space", default-features = false }
hologram-store-bare     = { path = "../hologram-store-bare", default-features = false }
hologram-realizations   = { path = "../hologram-realizations", default-features = false }
uefi = { version = "0.35", features = ["alloc", "global_allocator", "panic_handler", "logger"] }
# Force pure-Rust BLAKE3 (no x86 assembly .o) so the σ-axis links into a PE/UEFI binary.
blake3 = { version = "1", default-features = false, features = ["pure"] }

[features]
default = []
# Enable enumeration of UEFI `SimpleNetwork` handles in the hardware probe. Off by default because
# the protocol type is not exposed in every uefi-crate feature combination; on builds where it is,
# turn this on to count NICs alongside block devices.
probe-nics = []

[build-dependencies]
# Build-time driver assembly: compile a real WAT → Wasm and compute its blake3 κ, so the runtime's
# `verify_kappa` step is a meaningful **measured boot** check (mismatch ⇒ FAIL), not a tautology.
wat = "1"
blake3 = "1"

[profile.release]
panic = "abort"

[profile.dev]
panic = "abort"

[package]
name = "hologram-runtime-bare"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
description = "Bare-metal ContainerEngine for the Hologram substrate (architecture §2, C1). A no_std Wasm interpreter that satisfies the engine seam — symmetric to hologram-runtime-wasmtime for std hosts. Implements hg_init/event/suspend/resume/callback with linear-memory snapshot/restore."

[dependencies]
hologram-runtime        = { workspace = true }
hologram-space = { workspace = true }
spin                    = { workspace = true }
hashbrown               = { workspace = true }
# wasmi 2.x — no_std + alloc Wasm interpreter. Bare-metal substrate executes containers through it.
wasmi = { version = "2.0.0-beta.2", default-features = false }

[dev-dependencies]
hologram-store-mem    = { workspace = true }
wat                   = "1"
pollster              = { workspace = true }

[features]
default = ["std"]
std = [
    "hologram-runtime/std",
    "hologram-space/std",
    "wasmi/std",
]

[package]
name = "hologram-realizations"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
description = "Hologram deployment-substrate canonical-form realizations (container-manifest, capability-set, snapshot, runtime-state, error-event, channel) — IRI-tagged, operand-embedding, references() inverse-projection. See specs/docs/container-substrate-architecture.md §3.3."

[dependencies]
hologram-space = { workspace = true }

[dev-dependencies]
# uor-addr's `codemodule` (CCMAS) realization: code — drivers, container bodies, the engine itself —
# is content-addressed like any other artifact. Used to verify "drivers are addressed, not authored".
uor-addr = { workspace = true, features = ["alloc"] }

[features]
default = ["std"]
std = ["hologram-space/std"]

[package]
name = "hologram-runtime"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
description = "Substrate-portable Container Runtime orchestration (spec §4): lifecycle, snapshot-as-κ, and capability enforcement (admits) over a ContainerEngine seam + KappaStore. The Wasmtime engine is a backend behind the seam."

[dependencies]
hologram-space = { workspace = true }
async-trait             = { workspace = true }
spin                    = { workspace = true }
hashbrown               = { workspace = true }

[dev-dependencies]
hologram-store-mem = { workspace = true }
pollster           = { workspace = true }
# Driver-import V&V: drivers are codemodule κ-labels imported from authoritative sources + verified.
uor-addr           = { workspace = true, features = ["alloc"] }
async-trait        = { workspace = true }

[features]
default = ["std"]
std = ["hologram-space/std"]

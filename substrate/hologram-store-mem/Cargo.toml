[package]
name = "hologram-store-mem"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
description = "In-memory reference KappaStore for the Hologram deployment substrate: zero-copy put/get, pin/unpin, reachability GC. The portable reference impl + conformance fixture. See specs/docs/container-substrate-architecture.md."

[dependencies]
hologram-space = { workspace = true }
hashbrown               = { workspace = true }
spin                    = { workspace = true }

[dev-dependencies]
hologram-tck = { workspace = true }
# V&V ONLY — the upstream BLAKE3 reference impl (by the algorithm's authors) as an INDEPENDENT
# external oracle for the σ-axis (mirrors hologram-archive's AS class). Never a runtime dep.
blake3 = "1"
async-trait = { workspace = true }
pollster = { workspace = true }
criterion = { workspace = true }

[features]
default = ["std"]
std = ["hologram-space/std"]

[[bench]]
name = "sp_floors"
harness = false
required-features = ["std"]
